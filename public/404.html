<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jump Cube</title>
    <script>
      (function redirectToApp() {
        var repoBase = "/jumpCube";
        var path = window.location.pathname;
        var redirectPath = "/";

        if (path.indexOf(repoBase + "/") === 0) {
          redirectPath = path.slice(repoBase.length) || "/";
        }

        window.sessionStorage.setItem(
          "jumpCubeRedirectPath",
          redirectPath + window.location.search + window.location.hash,
        );
        window.location.replace(repoBase + "/");
      })();
    </script>
  </head>
  <body>
    <p>Loading Jump Cube...</p>
  </body>
</html>
